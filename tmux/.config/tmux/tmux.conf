# ~/.config/tmux/tmux.conf — tmux 3.2+, native Kanagawa Wave interface

# ---- General ---------------------------------------------------------------
set -g default-shell "/usr/bin/zsh"
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 10
set -g focus-events on
setw -g mode-keys vi

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g set-titles on
set -g set-titles-string "#S:#I:#W"
setw -g automatic-rename off
set -g allow-rename off
set -g display-time 1500
set -g status-interval 60
setw -g monitor-activity on
set -g visual-activity off
set -g allow-passthrough on
set -g detach-on-destroy off

# ---- Prefix and working-directory-aware creation ---------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Prefix navigation remains available even if vim-tmux-navigator is absent.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r n next-window
bind -r p previous-window
bind Tab last-window
bind S setw synchronize-panes \; display-message "sync #{?synchronize-panes,on,off}"

# ---- Popups ----------------------------------------------------------------
bind -N "lazygit popup" g display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "lazygit"
bind -N "scratch shell popup" C-p display-popup -E -d "#{pane_current_path}" -w 70% -h 70%
bind -N "sesh session switcher" C-f display-popup -E -d "#{pane_current_path}" -w 80% -h 70% -T "sesh" "~/.config/tmux/scripts/sesh-picker"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---- Copy mode --------------------------------------------------------------
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---- Kanagawa Wave palette --------------------------------------------------
# User options are the single source of truth for every style below.
set -g @kanagawa_bg "#1f1f28"
set -g @kanagawa_bg_dark "#16161d"
set -g @kanagawa_bg_light "#2a2a37"
set -g @kanagawa_fg "#dcd7ba"
set -g @kanagawa_fg_dim "#727169"
set -g @kanagawa_blue "#7e9cd8"
set -g @kanagawa_cyan "#7fb4ca"
set -g @kanagawa_yellow "#e6c384"
set -g @kanagawa_red "#e46876"
set -g @kanagawa_green "#98bb6c"

set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#{@kanagawa_fg},bg=#{@kanagawa_bg}"
set -g status-left-length 120
set -g status-right-length 120

# The fixed-width state field is always present, with the highest active state
# selected in this order: PREFIX, COPY, SYNC, ZOOM, NORMAL.
set -g status-left "#[fg=#{@kanagawa_blue},bg=#{@kanagawa_bg},bold] #I #[fg=#{@kanagawa_bg},bg=#{@kanagawa_yellow},bold]#{?client_prefix, PREFIX ,#{?pane_in_mode,  COPY  ,#{?pane_synchronized,  SYNC  ,#{?window_zoomed_flag,  ZOOM  , NORMAL }}}}#[fg=#{@kanagawa_fg_dim},bg=#{@kanagawa_bg}] "
set -g status-right "#[fg=#{@kanagawa_cyan},bg=#{@kanagawa_bg}] #{=/-40/...:pane_current_path} #[fg=#{@kanagawa_fg_dim}]| #[fg=#{@kanagawa_fg}]%Y-%m-%d %H:%M "

setw -g window-status-separator " "
setw -g window-status-style "fg=#{@kanagawa_fg_dim},bg=#{@kanagawa_bg}"
setw -g window-status-format "#[fg=#{@kanagawa_fg_dim},bg=#{@kanagawa_bg_light}] #I:#W#{?window_activity_flag,A,}#{?window_bell_flag,B,}#{?window_zoomed_flag,Z,} "
setw -g window-status-current-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_bg}"
setw -g window-status-current-format "#[fg=#{@kanagawa_bg},bg=#{@kanagawa_blue},bold] #I:#W#{?window_activity_flag,A,}#{?window_bell_flag,B,}#{?window_zoomed_flag,Z,} "
setw -g window-status-activity-style "fg=#{@kanagawa_yellow},bg=#{@kanagawa_bg},bold"
setw -g window-status-bell-style "fg=#{@kanagawa_red},bg=#{@kanagawa_bg},bold"

set -g pane-border-lines heavy
set -g pane-border-style "fg=#{@kanagawa_bg_light}"
set -g pane-active-border-style "fg=#{@kanagawa_blue}"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active, #[fg=#{@kanagawa_cyan}]#{=/-28/...:pane_current_path} #[fg=#{@kanagawa_yellow}]#{pane_current_command} ,}"

set -g message-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_yellow},bold"
set -g message-command-style "fg=#{@kanagawa_fg},bg=#{@kanagawa_bg_light}"
setw -g mode-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_blue},bold"
setw -g copy-mode-match-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_yellow}"
setw -g copy-mode-current-match-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_red},bold"
# These three scalar colour options do not expand tmux formats.
set -g display-panes-colour "#727169"
set -g display-panes-active-colour "#7e9cd8"
set -g clock-mode-colour "#7e9cd8"
set -g popup-style "fg=#{@kanagawa_fg},bg=#{@kanagawa_bg}"
set -g popup-border-style "fg=#{@kanagawa_blue}"

# ---- Seamless Neovim/tmux navigation ---------------------------------------
# TPM loads the plugin, while these explicit bindings make edge behavior and
# zoom preservation visible. Empty plugin mappings prevent it overriding them.
set -g @vim_navigator_mapping_left ""
set -g @vim_navigator_mapping_down ""
set -g @vim_navigator_mapping_up ""
set -g @vim_navigator_mapping_right ""
set -g @vim_navigator_mapping_prev ""
set -g @vim_navigator_prefix_mapping_clear_screen ""

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind -n C-h if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}' { } { select-pane -Z -L } }
bind -n C-j if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' { } { select-pane -Z -D } }
bind -n C-k if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}' { } { select-pane -Z -U } }
bind -n C-l if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}' { } { select-pane -Z -R } }
bind -T copy-mode-vi C-h if-shell -F '#{pane_at_left}' { } { select-pane -Z -L }
bind -T copy-mode-vi C-j if-shell -F '#{pane_at_bottom}' { } { select-pane -Z -D }
bind -T copy-mode-vi C-k if-shell -F '#{pane_at_top}' { } { select-pane -Z -U }
bind -T copy-mode-vi C-l if-shell -F '#{pane_at_right}' { } { select-pane -Z -R }
# C-\ intentionally has no tmux binding, preserving the terminal SIGQUIT key.

# ---- Pinned plugins and persistence ----------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Save topology, layout, commands and working directories, never visible pane
# text. Continuum saves every ten minutes and restores on a new server start.
set -g @resurrect-capture-pane-contents 'off'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Missing plugins degrade gracefully. Installation and upgrades belong only in
# install.sh; after TPM loads, remove its install/update/clean shortcuts.
# Keep this command last so TPM sees all declarations.
if-shell -b 'test -x ~/.config/tmux/plugins/tpm/tpm' "run-shell '~/.config/tmux/plugins/tpm/tpm; tmux unbind-key I; tmux unbind-key U; tmux unbind-key M-u'"
