# ~/.config/tmux/tmux.conf — sensible defaults

# ---- General ----
set -g default-shell "/usr/bin/zsh"           # new windows/panes start in zsh
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"           # true color (modern, tmux 3.2+)
set -g history-limit 50000                   # bigger scrollback
set -g mouse on                              # mouse: select panes, resize, scroll
set -sg escape-time 10                       # snappier ESC (helps nvim)
set -g focus-events on                       # let nvim know on focus change
setw -g mode-keys vi                         # vi keys in copy mode

# ---- Windows / panes start at 1 (easier to reach) ----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on                   # keep numbering gapless

# ---- Behavior / quality-of-life ----
set -g set-titles on                         # update the terminal emulator's title
set -g set-titles-string "#S:#I:#W"          # session:window-index:window-name
setw -g automatic-rename off                 # keep window names I set myself
set -g allow-rename off                      # don't let programs rename my windows
set -g display-time 1500                      # keep status messages up longer (ms)
set -g status-interval 5                      # refresh the status bar (clock) every 5s
setw -g monitor-activity on                  # flag activity in other windows
set -g visual-activity off                    # ...but don't pop a message for it
set -g allow-passthrough on                   # let programs pass escape seqs (images, etc.)
set -g detach-on-destroy off                  # closing a session's last window -> switch, not detach

# ---- Prefix: C-b -> C-a ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- Splits: \ (vertical) and - (horizontal), open in current path ----
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---- Vim-style pane navigation (prefix + h/j/k/l) ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Pane resizing (prefix + H/J/K/L, repeatable) ----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Windows: navigation & extras ----
bind -r n next-window                         # next window (repeatable)
bind -r p previous-window                     # previous window (repeatable)
bind Tab last-window                          # jump back to the last-used window
bind S setw synchronize-panes \; display-message "sync #{?synchronize-panes,on,off}"  # toggle typing to all panes

# ---- Popups: floating windows (tmux 3.2+) ----
bind -N "lazygit popup"        g   display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "lazygit"
bind -N "scratch shell popup"  C-p display-popup -E -d "#{pane_current_path}" -w 70% -h 70%
bind -N "fzf session switcher" C-f display-popup -E "tmux list-sessions -F '#S' | fzf --reverse --header 'switch session' | xargs -r tmux switch-client -t"

# ---- Reload config: prefix + r ----
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---- Copy mode (vi): v to select, y to yank into the OS clipboard ----
set -g set-clipboard on                       # let apps + OSC52 set the clipboard too
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
# Mouse: drag-select then release -> copy to OS clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle   # block (column) selection

# ---- Pane borders: highlight the active pane ----
set -g pane-border-lines single               # border glyphs; try "heavy" for thicker
set -g pane-border-style "fg=colour238"       # inactive borders: dim grey
set -g pane-active-border-style "fg=colour39" # active border: blue (matches status)

# ---- Status bar: minimal, readable ----
set -g status-style "bg=colour234,fg=colour250"
set -g status-left "#[bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=colour245] %Y-%m-%d %H:%M "
setw -g window-status-current-style "bg=colour39,fg=colour234,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# ---- Plugins (TPM) ----
# This file only DECLARES plugins (like requirements.txt). The actual code is
# fetched per machine into ~/.config/tmux/plugins/ and is git-ignored (not synced).
#   prefix + I      install declared plugins
#   prefix + U      update plugins
#   prefix + M-u    remove plugins no longer listed
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # safe, non-clobbering baseline

# Session persistence: resurrect saves/restores, continuum automates it.
#   prefix + C-s  save now        prefix + C-r  restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'  # also restore each pane's visible text
set -g @continuum-restore 'on'                # auto-restore last session on server start
set -g @continuum-save-interval '10'          # auto-save every 10 minutes

# Fresh machine: auto-clone TPM (and install plugins) on first launch, so a
# brand-new checkout only needs `prefix + I` — or nothing at all here.
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM — keep this line LAST in the file.
run '~/.config/tmux/plugins/tpm/tpm'
