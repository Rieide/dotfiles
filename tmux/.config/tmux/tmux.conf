# ~/.config/tmux/tmux.conf — sensible defaults

# ---- General ----
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # true color
set -g history-limit 50000                   # bigger scrollback
set -g mouse on                              # mouse: select panes, resize, scroll
set -sg escape-time 10                       # snappier ESC (helps nvim)
set -g focus-events on                       # let nvim know on focus change
setw -g mode-keys vi                         # vi keys in copy mode

# ---- Windows / panes start at 1 (easier to reach) ----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on                   # keep numbering gapless

# ---- Prefix: C-b -> C-a ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- Splits: \ (vertical) and - (horizontal), open in current path ----
unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---- Vim-style pane navigation (prefix + h/j/k/l) ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Pane resizing (prefix + H/J/K/L, repeatable) ----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Reload config: prefix + r ----
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---- Copy mode (vi): v to select, y to yank into the OS clipboard ----
set -g set-clipboard on                       # let apps + OSC52 set the clipboard too
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
# Mouse: drag-select then release -> copy to OS clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# ---- Status bar: minimal, readable ----
set -g status-style "bg=colour234,fg=colour250"
set -g status-left "#[bold] #S "
set -g status-left-length 30
set -g status-right "#[fg=colour245] %Y-%m-%d %H:%M "
setw -g window-status-current-style "bg=colour39,fg=colour234,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
