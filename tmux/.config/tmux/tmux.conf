# ~/.config/tmux/tmux.conf — tmux 3.2+, native Kanagawa Wave interface

# ---- General ---------------------------------------------------------------
set -g default-shell "/usr/bin/zsh"
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g history-limit 50000
set -g mouse on
set -sg escape-time 10
set -g focus-events on
setw -g mode-keys vi

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g set-titles on
set -g set-titles-string "#S:#I:#W"
setw -g automatic-rename off
set -g allow-rename off
set -g display-time 1500
set -g status-interval 60
setw -g monitor-activity on
set -g visual-activity off
set -g allow-passthrough on
set -g detach-on-destroy off

# ---- Prefix and working-directory-aware creation ---------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind '"'
unbind %
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Prefix navigation remains available even if vim-tmux-navigator is absent.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -r n next-window
bind -r p previous-window
bind Tab last-window
bind S setw synchronize-panes \; display-message "sync #{?synchronize-panes,on,off}"

# ---- Popups ----------------------------------------------------------------
bind -N "lazygit popup" g display-popup -E -d "#{pane_current_path}" -w 80% -h 80% "lazygit"
bind -N "scratch shell popup" C-p display-popup -E -d "#{pane_current_path}" -w 70% -h 70%
bind -N "fzf session switcher" C-f display-popup -E "tmux list-sessions -F '#S' | fzf --reverse --header 'switch session' | xargs -r tmux switch-client -t"

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---- Copy mode --------------------------------------------------------------
set -g set-clipboard on
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---- Kanagawa Wave palette --------------------------------------------------
# User options are the single source of truth for every style below.
set -g @kanagawa_bg "#1f1f28"
set -g @kanagawa_bg_dark "#16161d"
set -g @kanagawa_bg_light "#2a2a37"
set -g @kanagawa_fg "#dcd7ba"
set -g @kanagawa_fg_dim "#727169"
set -g @kanagawa_blue "#7e9cd8"
set -g @kanagawa_cyan "#7fb4ca"
set -g @kanagawa_yellow "#e6c384"
set -g @kanagawa_red "#e46876"
set -g @kanagawa_green "#98bb6c"

set -g status-position bottom
set -g status-justify centre
set -g status-style "fg=#{@kanagawa_fg},bg=#{@kanagawa_bg}"
set -g status-left-length 100
set -g status-right-length 100

# Formats cannot read tmux environment entries directly. Mirror the SSH state
# into a user option at startup and whenever a client attaches.
if-shell '[ -n "$SSH_CONNECTION" ]' 'set -g @ssh_attached 1' 'set -g @ssh_attached 0'
set-hook -g client-attached 'if-shell '\''[ -n "$SSH_CONNECTION" ]'\'' '\''set -g @ssh_attached 1'\'' '\''set -g @ssh_attached 0'\'''

# Labels appear only while their state is active. The window list occupies the
# centre automatically; no status segment invokes CPU/weather/Git helpers.
set -g status-left "#[fg=#{@kanagawa_bg},bg=#{@kanagawa_blue},bold] #S #[default]#{?client_prefix,#[fg=#{@kanagawa_bg}#,bg=#{@kanagawa_yellow}#,bold] PREFIX #[default],}#{?pane_in_mode,#[fg=#{@kanagawa_bg}#,bg=#{@kanagawa_cyan}#,bold] COPY #[default],}#{?pane_synchronized,#[fg=#{@kanagawa_bg}#,bg=#{@kanagawa_red}#,bold] SYNC #[default],}#{?window_zoomed_flag,#[fg=#{@kanagawa_bg}#,bg=#{@kanagawa_green}#,bold] ZOOM #[default],}"
set -g status-right "#[fg=#{@kanagawa_fg_dim}] #{=/-40/...:pane_current_path}#{?@ssh_attached, #[fg=#{@kanagawa_yellow}]#H,} #[fg=#{@kanagawa_fg}]%Y-%m-%d %H:%M "

setw -g window-status-separator " "
setw -g window-status-style "fg=#{@kanagawa_fg_dim},bg=#{@kanagawa_bg}"
setw -g window-status-format " #I:#W#{?window_activity_flag,A,}#{?window_bell_flag,B,}#{?window_zoomed_flag,Z,} "
setw -g window-status-current-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_blue},bold"
setw -g window-status-current-format " #I:#W#{?window_activity_flag,A,}#{?window_bell_flag,B,}#{?window_zoomed_flag,Z,} "
setw -g window-status-activity-style "fg=#{@kanagawa_yellow},bg=#{@kanagawa_bg},bold"
setw -g window-status-bell-style "fg=#{@kanagawa_red},bg=#{@kanagawa_bg},bold"

set -g pane-border-lines heavy
set -g pane-border-style "fg=#{@kanagawa_bg_light}"
set -g pane-active-border-style "fg=#{@kanagawa_blue}"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active, #[fg=#{@kanagawa_cyan}]#{=/-28/...:pane_current_path} #[fg=#{@kanagawa_yellow}]#{pane_current_command} ,}"

set -g message-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_yellow},bold"
set -g message-command-style "fg=#{@kanagawa_fg},bg=#{@kanagawa_bg_light}"
setw -g mode-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_blue},bold"
setw -g copy-mode-match-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_yellow}"
setw -g copy-mode-current-match-style "fg=#{@kanagawa_bg},bg=#{@kanagawa_red},bold"
set -g display-panes-colour "#{@kanagawa_fg_dim}"
set -g display-panes-active-colour "#{@kanagawa_blue}"
set -g clock-mode-colour "#{@kanagawa_blue}"
set -g popup-style "fg=#{@kanagawa_fg},bg=#{@kanagawa_bg}"
set -g popup-border-style "fg=#{@kanagawa_blue}"

# ---- Pinned plugins and persistence ----------------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Save topology, layout, commands and working directories, never visible pane
# text. Continuum saves every ten minutes and restores on a new server start.
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Missing plugins degrade gracefully. Installation and upgrades belong only in
# install.sh; after TPM loads, remove its install/update/clean shortcuts.
# Keep this command last so TPM sees all declarations.
if-shell -b 'test -x ~/.config/tmux/plugins/tpm/tpm' "run-shell '~/.config/tmux/plugins/tpm/tpm; tmux unbind-key I; tmux unbind-key U; tmux unbind-key M-u'"
